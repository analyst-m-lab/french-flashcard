<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartes Éclair — フランス語フラッシュカード</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --cream: #f5f0e8;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --terracotta: #c4553a;
    --sage: #5a7a5a;
    --shadow: rgba(26,18,9,0.15);
    --card-bg: #fffdf7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(196,85,58,0.08) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1rem;
    border-bottom: 1px solid var(--gold-light);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  header h1 span {
    color: var(--gold);
    font-style: italic;
  }

  header p {
    font-size: 0.85rem;
    font-weight: 300;
    color: #6b5c3e;
    margin-top: 0.3rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border-bottom: 2px solid var(--gold-light);
  }

  .tab {
    padding: 0.7rem 1.4rem;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: none;
    background: none;
    color: #8a7355;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
  }

  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--gold);
  }

  .tab:hover:not(.active) { color: var(--ink); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ─── Form ─── */
  .form-card {
    background: var(--card-bg);
    border: 1px solid var(--gold-light);
    border-radius: 12px;
    padding: 1.8rem;
    box-shadow: 0 4px 20px var(--shadow);
  }

  .form-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .form-group.full { grid-column: 1/-1; }

  label {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #8a7355;
  }

  input, select, textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.65rem 0.9rem;
    border: 1px solid var(--gold-light);
    border-radius: 8px;
    background: #fffef9;
    color: var(--ink);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
  }

  .category-row {
    display: flex;
    gap: 0.6rem;
  }

  .category-row input { flex: 1; }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 0.65rem 1.4rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--cream);
    width: 100%;
    padding: 0.8rem;
    font-size: 0.95rem;
    margin-top: 0.5rem;
  }

  .btn-primary:hover { background: #2d1f0a; transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }

  .btn-sm {
    padding: 0.45rem 0.9rem;
    font-size: 0.8rem;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--gold-light);
    color: var(--ink);
  }

  .btn-outline:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }

  .btn-gold {
    background: var(--gold);
    color: white;
  }

  .btn-gold:hover { background: #b8943d; }

  /* ─── Category Badges ─── */
  .cat-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 0.5rem;
  }

  .cat-badge {
    font-size: 0.75rem;
    padding: 0.25rem 0.7rem;
    border-radius: 20px;
    background: var(--gold-light);
    color: #5a4020;
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid transparent;
  }

  .cat-badge:hover { border-color: var(--gold); }
  .cat-badge.selected { background: var(--gold); color: white; border-color: var(--gold); }
  .cat-badge.del-mode { border-color: var(--terracotta); }

  /* ─── Flashcard Area ─── */
  .fc-controls {
    background: var(--card-bg);
    border: 1px solid var(--gold-light);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: flex-end;
  }

  .fc-control-group {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    flex: 1;
    min-width: 140px;
  }

  .toggle-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .toggle-btn {
    font-size: 0.8rem;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    border: 1.5px solid var(--gold-light);
    background: transparent;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.18s;
    font-family: 'DM Sans', sans-serif;
  }

  .toggle-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

  .card-count {
    font-size: 0.8rem;
    color: #8a7355;
    white-space: nowrap;
    align-self: flex-end;
    padding-bottom: 0.4rem;
  }

  /* ─── Flashcard ─── */
  .fc-wrapper {
    perspective: 1000px;
    height: 260px;
    margin-bottom: 1.5rem;
    cursor: pointer;
  }

  .fc-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  .fc-inner.flipped { transform: rotateY(180deg); }

  .fc-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--card-bg);
    border: 1px solid var(--gold-light);
    border-radius: 16px;
    box-shadow: 0 8px 40px var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    gap: 0.5rem;
  }

  .fc-face.back { transform: rotateY(180deg); }

  .fc-lang-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #b09060;
    font-weight: 500;
  }

  .fc-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 4vw, 1.9rem);
    line-height: 1.4;
    color: var(--ink);
  }

  .fc-category {
    font-size: 0.72rem;
    color: white;
    background: var(--gold);
    padding: 0.2rem 0.7rem;
    border-radius: 12px;
    font-weight: 500;
    margin-top: 0.5rem;
  }

  .fc-hint {
    font-size: 0.72rem;
    color: #b09060;
    margin-top: 0.8rem;
    font-style: italic;
  }

  .fc-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 260px;
    background: var(--card-bg);
    border: 2px dashed var(--gold-light);
    border-radius: 16px;
    color: #b09060;
    gap: 0.5rem;
  }

  .fc-empty .icon { font-size: 2.5rem; }
  .fc-empty p { font-size: 0.9rem; }

  /* ─── Navigation ─── */
  .fc-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    margin-bottom: 1.5rem;
  }

  .nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--gold-light);
    background: var(--card-bg);
    cursor: pointer;
    font-size: 1.1rem;
    color: var(--ink);
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-btn:hover:not(:disabled) { border-color: var(--gold); background: rgba(201,168,76,0.1); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .nav-counter {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    min-width: 80px;
    text-align: center;
    color: #5a4020;
  }

  .audio-row {
    display: flex;
    justify-content: center;
    gap: 0.8rem;
    margin-bottom: 2rem;
  }

  /* ─── Card List ─── */
  .list-controls {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1rem;
  }

  .list-controls select { width: auto; flex: 1; min-width: 130px; }

  .card-list { display: flex; flex-direction: column; gap: 0.7rem; }

  .card-item {
    background: var(--card-bg);
    border: 1px solid var(--gold-light);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-item-texts { flex: 1; }
  .card-item-fr { font-family: 'Playfair Display', serif; font-size: 1rem; margin-bottom: 0.2rem; }
  .card-item-ja { font-size: 0.88rem; color: #6b5c3e; }

  .card-item-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.4rem;
  }

  .btn-delete {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    color: #c4553a66;
    transition: color 0.15s;
    padding: 0.2rem;
  }

  .btn-delete:hover { color: var(--terracotta); }

  .empty-list {
    text-align: center;
    color: #b09060;
    font-style: italic;
    padding: 2rem;
    font-size: 0.9rem;
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--gold-light);
    border-radius: 2px;
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--cream);
    padding: 0.7rem 1.4rem;
    border-radius: 8px;
    font-size: 0.88rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
    .fc-controls { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <h1>Cartes <span>Éclair</span></h1>
  <p>フランス語フラッシュカード</p>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">✏️ カードを追加</button>
    <button class="tab" onclick="switchTab('flash')">🃏 フラッシュカード</button>
    <button class="tab" onclick="switchTab('list')">📋 カード一覧</button>
  </div>

  <!-- ─── ADD PANEL ─── -->
  <div id="panel-add" class="panel active">
    <div class="form-card">
      <h2>🌿 新しいカードを登録</h2>
      <div class="form-row">
        <div class="form-group">
          <label>フランス語文章 FR</label>
          <input type="text" id="inp-fr" placeholder="Bonjour, comment ça va ?" />
        </div>
        <div class="form-group">
          <label>日本語訳 JA</label>
          <input type="text" id="inp-ja" placeholder="こんにちは、元気ですか？" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label>カテゴリ</label>
          <div class="category-row">
            <input type="text" id="inp-cat" placeholder="カテゴリ名（例：挨拶、動詞、旅行）" list="cat-list" />
            <datalist id="cat-list"></datalist>
          </div>
          <div class="cat-badges" id="cat-suggestions"></div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addCard()">＋ カードを登録する</button>
    </div>
  </div>

  <!-- ─── FLASHCARD PANEL ─── -->
  <div id="panel-flash" class="panel">
    <div class="fc-controls">
      <div class="fc-control-group">
        <label>カテゴリフィルター</label>
        <select id="fc-cat-filter" onchange="applyFilters()">
          <option value="">すべて</option>
        </select>
      </div>
      <div class="fc-control-group">
        <label>開始言語</label>
        <div class="toggle-row">
          <button class="toggle-btn active" id="btn-lang-fr" onclick="setStartLang('fr')">🇫🇷 フランス語</button>
          <button class="toggle-btn" id="btn-lang-ja" onclick="setStartLang('ja')">🇯🇵 日本語</button>
        </div>
      </div>
      <div class="fc-control-group">
        <label>シャッフル</label>
        <div class="toggle-row">
          <button class="toggle-btn" id="btn-shuffle" onclick="toggleShuffle()">🔀 シャッフル</button>
        </div>
      </div>
      <div class="card-count" id="fc-count">0 枚</div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="fc-progress"></div></div>

    <div id="fc-display"></div>

    <div class="fc-nav">
      <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">←</button>
      <span class="nav-counter" id="fc-nav-counter">— / —</span>
      <button class="nav-btn" id="btn-next" onclick="navigate(1)">→</button>
    </div>

    <div class="audio-row">
      <button class="btn btn-outline btn-sm" onclick="speakCurrent('fr')">🔊 フランス語で聴く</button>
      <button class="btn btn-outline btn-sm" onclick="speakCurrent('ja')">🔊 日本語で聴く</button>
    </div>
  </div>

  <!-- ─── LIST PANEL ─── -->
  <div id="panel-list" class="panel">
    <div class="list-controls">
      <select id="list-cat-filter" onchange="renderList()">
        <option value="">すべてのカテゴリ</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="exportCards()">📥 エクスポート</button>
    </div>
    <div class="card-list" id="card-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────
let cards = JSON.parse(localStorage.getItem('cartes-eclair-v2') || '[]');
let startLang = 'fr';
let shuffleOn = false;
let fcCards = [];   // filtered + possibly shuffled
let fcIndex = 0;
let fcFlipped = false;

// ─── Persist ─────────────────────────────────────────────
function save() {
  localStorage.setItem('cartes-eclair-v2', JSON.stringify(cards));
}

// ─── Tab ─────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const idx = {add:0,flash:1,list:2}[name];
  document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  if (name === 'flash') { refreshCatFilter('fc-cat-filter'); applyFilters(); }
  if (name === 'list')  { refreshCatFilter('list-cat-filter'); renderList(); }
}

// ─── Categories ──────────────────────────────────────────
function allCategories() {
  return [...new Set(cards.map(c => c.cat).filter(Boolean))].sort();
}

function refreshCatFilter(id) {
  const sel = document.getElementById(id);
  const current = sel.value;
  const label = id === 'fc-cat-filter' ? 'すべて' : 'すべてのカテゴリ';
  sel.innerHTML = `<option value="">${label}</option>`;
  allCategories().forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat; opt.textContent = cat;
    if (cat === current) opt.selected = true;
    sel.appendChild(opt);
  });
  updateCatDatalist();
  renderCatSuggestions();
}

function updateCatDatalist() {
  const dl = document.getElementById('cat-list');
  dl.innerHTML = '';
  allCategories().forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    dl.appendChild(opt);
  });
}

function renderCatSuggestions() {
  const container = document.getElementById('cat-suggestions');
  const cats = allCategories();
  if (!cats.length) { container.innerHTML = ''; return; }
  container.innerHTML = cats.map(c =>
    `<span class="cat-badge" onclick="document.getElementById('inp-cat').value='${c}'">${c}</span>`
  ).join('');
}

// ─── Add Card ────────────────────────────────────────────
function addCard() {
  const fr = document.getElementById('inp-fr').value.trim();
  const ja = document.getElementById('inp-ja').value.trim();
  const cat = document.getElementById('inp-cat').value.trim();
  if (!fr || !ja) { showToast('フランス語と日本語を入力してください'); return; }
  cards.push({ id: Date.now(), fr, ja, cat: cat || '' });
  save();
  document.getElementById('inp-fr').value = '';
  document.getElementById('inp-ja').value = '';
  document.getElementById('inp-cat').value = '';
  showToast('✓ カードを登録しました');
  renderCatSuggestions();
  updateCatDatalist();
}

// ─── Flashcard ───────────────────────────────────────────
function setStartLang(lang) {
  startLang = lang;
  document.getElementById('btn-lang-fr').classList.toggle('active', lang === 'fr');
  document.getElementById('btn-lang-ja').classList.toggle('active', lang === 'ja');
  applyFilters();
}

function toggleShuffle() {
  shuffleOn = !shuffleOn;
  document.getElementById('btn-shuffle').classList.toggle('active', shuffleOn);
  applyFilters();
}

function applyFilters() {
  const cat = document.getElementById('fc-cat-filter').value;
  let filtered = cat ? cards.filter(c => c.cat === cat) : [...cards];
  if (shuffleOn) filtered = shuffleArr(filtered);
  fcCards = filtered;
  fcIndex = 0;
  fcFlipped = false;
  document.getElementById('fc-count').textContent = fcCards.length + ' 枚';
  renderCard();
}

function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderCard() {
  const display = document.getElementById('fc-display');
  const counter = document.getElementById('fc-nav-counter');
  const progress = document.getElementById('fc-progress');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');

  if (!fcCards.length) {
    display.innerHTML = `
      <div class="fc-empty">
        <div class="icon">🃏</div>
        <p>このカテゴリにカードがありません</p>
        <p style="font-size:0.78rem; margin-top:0.3rem">カードを追加タブから登録しましょう</p>
      </div>`;
    counter.textContent = '— / —';
    progress.style.width = '0%';
    btnPrev.disabled = btnNext.disabled = true;
    return;
  }

  const card = fcCards[fcIndex];
  const frontLang = startLang;
  const backLang = startLang === 'fr' ? 'ja' : 'fr';
  const frontText = frontLang === 'fr' ? card.fr : card.ja;
  const backText  = backLang  === 'fr' ? card.fr : card.ja;
  const frontLabel = frontLang === 'fr' ? '🇫🇷 Français' : '🇯🇵 日本語';
  const backLabel  = backLang  === 'fr' ? '🇫🇷 Français' : '🇯🇵 日本語';
  const catTag = card.cat ? `<span class="fc-category">${card.cat}</span>` : '';

  display.innerHTML = `
    <div class="fc-wrapper" onclick="flipCard()">
      <div class="fc-inner ${fcFlipped ? 'flipped' : ''}" id="fc-inner">
        <div class="fc-face front">
          <div class="fc-lang-label">${frontLabel}</div>
          <div class="fc-text">${frontText}</div>
          ${catTag}
          <div class="fc-hint">クリックして${backLang === 'fr' ? 'フランス語' : '日本語'}を見る</div>
        </div>
        <div class="fc-face back">
          <div class="fc-lang-label">${backLabel}</div>
          <div class="fc-text">${backText}</div>
          ${catTag}
          <div class="fc-hint">クリックして戻る</div>
        </div>
      </div>
    </div>`;

  counter.textContent = `${fcIndex + 1} / ${fcCards.length}`;
  const pct = fcCards.length > 1 ? ((fcIndex) / (fcCards.length - 1)) * 100 : 100;
  progress.style.width = pct + '%';
  btnPrev.disabled = fcIndex === 0;
  btnNext.disabled = fcIndex === fcCards.length - 1;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  const inner = document.getElementById('fc-inner');
  if (inner) inner.classList.toggle('flipped', fcFlipped);
}

function navigate(dir) {
  fcIndex = Math.max(0, Math.min(fcCards.length - 1, fcIndex + dir));
  fcFlipped = false;
  renderCard();
}

// ─── Audio ───────────────────────────────────────────────
function speakCurrent(lang) {
  if (!fcCards.length) return;
  const card = fcCards[fcIndex];
  const text = lang === 'fr' ? card.fr : card.ja;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang === 'fr' ? 'fr-FR' : 'ja-JP';
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

// ─── List ────────────────────────────────────────────────
function renderList() {
  const cat = document.getElementById('list-cat-filter').value;
  const filtered = cat ? cards.filter(c => c.cat === cat) : [...cards];
  const list = document.getElementById('card-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-list">カードがありません</div>';
    return;
  }
  list.innerHTML = filtered.map(c => `
    <div class="card-item" id="item-${c.id}">
      <div class="card-item-texts">
        <div class="card-item-fr">${c.fr}</div>
        <div class="card-item-ja">${c.ja}</div>
      </div>
      <div class="card-item-meta">
        ${c.cat ? `<span class="cat-badge" style="cursor:default">${c.cat}</span>` : ''}
        <button class="btn-delete" onclick="deleteCard(${c.id})" title="削除">✕</button>
      </div>
    </div>
  `).join('');
}

function deleteCard(id) {
  cards = cards.filter(c => c.id !== id);
  save();
  refreshCatFilter('list-cat-filter');
  renderList();
  showToast('カードを削除しました');
}

function exportCards() {
  const cat = document.getElementById('list-cat-filter').value;
  const filtered = cat ? cards.filter(c => c.cat === cat) : [...cards];
  const csv = 'FR,JA,カテゴリ\n' + filtered.map(c =>
    `"${c.fr.replace(/"/g,'""')}","${c.ja.replace(/"/g,'""')}","${c.cat}"`
  ).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cartes-eclair.csv';
  a.click();
}

// ─── Toast ───────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Init ────────────────────────────────────────────────
updateCatDatalist();
renderCatSuggestions();

// Keyboard navigation
document.addEventListener('keydown', e => {
  const panel = document.getElementById('panel-flash');
  if (!panel.classList.contains('active')) return;
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});
</script>
</body>
</html>
